<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Pro Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,255,170,0.12), transparent 35%),
        radial-gradient(circle at right, rgba(0,153,255,0.12), transparent 30%),
        linear-gradient(180deg, #071019 0%, #04070d 100%);
      color: #eaf2ff;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .title span {
      color: #39ffb6;
      text-shadow: 0 0 20px rgba(57,255,182,0.4);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, button {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }

    .label {
      color: #97a7c6;
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .value {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
    }

    .accent {
      color: #39ffb6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .side-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      margin-bottom: 10px;
      color: #dce7ff;
      word-break: break-word;
    }

    canvas {
      width: 100% !important;
      max-height: 360px;
    }

    .muted {
      color: #95a6c9;
      font-size: 13px;
      margin-top: -4px;
      margin-bottom: 14px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .layout { grid-template-columns: 1fr; }
      .side-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
      .value { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">Analytics <span>Control</span></div>

      <div class="controls">
        <select id="siteFilter">
          <option value="all">Todos os sites</option>
        </select>

        <select id="periodFilter">
          <option value="7">Últimos 7 dias</option>
          <option value="15">Últimos 15 dias</option>
          <option value="30" selected>Últimos 30 dias</option>
        </select>

        <button id="refreshBtn">Atualizar</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Visitas</div>
        <div class="value" id="totalVisits">0</div>
      </div>

      <div class="card">
        <div class="label">Visitantes online agora</div>
        <div class="value accent" id="onlineNow">0</div>
      </div>

      <div class="card">
        <div class="label">Páginas acessadas</div>
        <div class="value" id="totalPages">0</div>
      </div>

      <div class="card">
        <div class="label">Países</div>
        <div class="value" id="totalCountries">0</div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h3>Gráfico diário</h3>
        <div class="muted">Visitas por dia no período selecionado</div>
        <canvas id="chart"></canvas>
      </div>

      <div class="side-grid">
        <div class="card">
          <h3>Sites</h3>
          <ul id="sitesList"></ul>
        </div>

        <div class="card">
          <h3>Top páginas</h3>
          <ul id="pagesList"></ul>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="side-grid">
        <div class="card">
          <h3>Top referrers</h3>
          <ul id="referrersList"></ul>
        </div>

        <div class="card">
          <h3>Navegadores</h3>
          <ul id="browsersList"></ul>
        </div>
      </div>

      <div class="side-grid">
        <div class="card">
          <h3>Dispositivos</h3>
          <ul id="devicesList"></ul>
        </div>

        <div class="card">
          <h3>Países</h3>
          <ul id="countriesList"></ul>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
