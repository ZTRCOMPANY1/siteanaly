<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Analytics Simples</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1020;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .card h2, .card h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .big-number {
      font-size: 34px;
      font-weight: bold;
      color: #7dd3fc;
    }

    .two-cols {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      word-break: break-word;
    }

    canvas {
      width: 100% !important;
      max-height: 340px;
    }

    .muted {
      color: #b8c1d9;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .two-cols {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Painel de Analytics</h1>

    <div class="grid">
      <div class="card">
        <h2>Total de visitas</h2>
        <div class="big-number" id="totalVisits">0</div>
      </div>

      <div class="card">
        <h2>Visitantes hoje</h2>
        <div class="big-number" id="todayVisits">0</div>
      </div>

      <div class="card">
        <h2>Total de páginas</h2>
        <div class="big-number" id="totalPages">0</div>
      </div>

      <div class="card">
        <h2>Total de países</h2>
        <div class="big-number" id="totalCountries">0</div>
      </div>
    </div>

    <div class="card">
      <h2>Gráfico diário</h2>
      <p class="muted">Visitas por dia</p>
      <canvas id="dailyChart"></canvas>
    </div>

    <div class="two-cols">
      <div class="card">
        <h3>Páginas mais acessadas</h3>
        <ul id="topPages"></ul>
      </div>

      <div class="card">
        <h3>Países</h3>
        <ul id="topCountries"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
